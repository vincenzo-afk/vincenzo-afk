name: 📊 Update WakaTime Stats

# ⚠️  SETUP REQUIRED before enabling this workflow:
#   1. Sign up at https://wakatime.com and install the IDE plugin
#   2. Go to your WakaTime account → Settings → API Key
#   3. Add it as a secret in your profile repo:
#      Settings → Secrets → Actions → New → Name: WAKATIME_API_KEY
#   4. Replace YOUR_WAKATIME_USERNAME in README.md with your actual username
#   5. Uncomment the "on:" trigger below to activate

on:
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update WakaTime Stats in README
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Update WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          COMMIT_BY_ME: "True"
          SHOW_SHORT_INFO: "True"
